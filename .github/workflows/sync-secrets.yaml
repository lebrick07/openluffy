name: Sync Secrets to Cluster

# Manually trigger or run when secrets change
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sync-secrets.yaml'

jobs:
  seal-and-commit:
    name: Seal Secrets & Commit to Git
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop
      
      - name: Install kubeseal
        run: |
          wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.0/kubeseal-0.26.0-linux-amd64.tar.gz
          tar xzf kubeseal-0.26.0-linux-amd64.tar.gz
          sudo mv kubeseal /usr/local/bin/
          kubeseal --version
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
      
      - name: Fetch SealedSecrets public key
        run: |
          # For now, we embed the public key
          # In production, fetch from cluster or store in GitHub secrets
          echo "Note: This requires the cluster's SealedSecret public key"
          echo "Run: kubeseal --fetch-cert > pub-cert.pem"
          echo "Then add to GitHub Secrets as SEALED_SECRETS_CERT"
      
      - name: Create sealed secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p k8s/sealed-secrets
          
          # Note: This requires access to the cluster's public key
          # For automated deployment, the public key should be in GitHub Secrets
          # For now, this is a template
          
          for ENV in dev preprod prod; do
            NAMESPACE="openluffy-${ENV}"
            
            kubectl create secret generic openluffy-${ENV}-api-keys \
              --namespace "$NAMESPACE" \
              --from-literal=claude-api-key="$ANTHROPIC_API_KEY" \
              --from-literal=github-token="$GH_PAT" \
              --from-literal=github-webhook-secret="" \
              --from-literal=openai-api-key="" \
              --dry-run=client -o yaml | \
              kubeseal --cert=pub-cert.pem --format=yaml \
              > k8s/sealed-secrets/${ENV}-api-keys-sealed.yaml || echo "Skipping ${ENV} - no cert available"
          done
      
      - name: Commit sealed secrets
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add k8s/sealed-secrets/ || true
          git commit -m "chore: Update sealed secrets [skip ci]" || echo "No changes"
          git pull --rebase origin develop
          git push origin develop
      
      - name: Summary
        run: |
          echo "✅ Sealed secrets updated"
          echo "ArgoCD will sync them automatically"
          echo "SealedSecret controller will decrypt in-cluster"
