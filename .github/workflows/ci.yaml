name: CI Pipeline

on:
  pull_request:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_PLATFORMS: linux/arm64

jobs:
  # Stage 1: Source Code Security Scan
  source-security:
    name: Source Security Scan
    runs-on: openluffy-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # Stage 2: Code Quality - Backend
  code-quality-backend:
    name: Code Quality - Backend
    runs-on: openluffy-runner
    needs: [source-security]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install linters
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff black
      
      - name: Run Ruff (linter)
        run: |
          cd backend
          ruff check .
        continue-on-error: true
      
      - name: Check formatting (Black)
        run: |
          cd backend
          black --check .
        continue-on-error: true

  # Stage 3: Code Quality - Frontend
  code-quality-frontend:
    name: Code Quality - Frontend
    runs-on: openluffy-runner
    needs: [source-security]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openluffy-ui/package-lock.json
      
      - name: Install dependencies
        run: |
          cd openluffy-ui
          npm ci
      
      - name: Run ESLint
        run: |
          cd openluffy-ui
          npm run lint
        continue-on-error: true

  # Stage 4: Backend - Build
  build-backend:
    name: Build Backend
    runs-on: openluffy-runner
    needs: [code-quality-backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:pr-${{ github.event.pull_request.number }}
          load: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 5: Backend - Security Scan
  scan-backend:
    name: Scan Backend
    runs-on: openluffy-runner
    needs: [build-backend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:pr-${{ github.event.pull_request.number }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  # Stage 6: Frontend - Build
  build-frontend:
    name: Build Frontend
    runs-on: openluffy-runner
    needs: [code-quality-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./openluffy-ui/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:pr-${{ github.event.pull_request.number }}
          load: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 7: Frontend - Security Scan
  scan-frontend:
    name: Scan Frontend
    runs-on: openluffy-runner
    needs: [build-frontend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:pr-${{ github.event.pull_request.number }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'

  # Stage 8: Tests
  tests:
    name: Integration Tests
    runs-on: openluffy-runner
    needs: [scan-backend, scan-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Run backend tests
        run: |
          cd backend
          pip install -r requirements.txt
          python test_triage.py || echo "Tests not yet implemented"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openluffy-ui/package-lock.json
      
      - name: Run frontend tests
        run: |
          cd openluffy-ui
          npm ci
          npm run test:unit || echo "Tests not yet implemented"
