name: Release - Production

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Promote Backend
  promote-backend:
    name: Promote Backend
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    permissions:
      packages: write
    outputs:
      dev_sha: ${{ steps.find-sha.outputs.dev_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find dev SHA
        id: find-sha
        run: |
          DEV_SHA=$(git log --merges -1 --pretty=format:%P | awk '{print $2}')
          [ -z "$DEV_SHA" ] && DEV_SHA=${{ github.sha }}
          SHORT_DEV_SHA=$(echo $DEV_SHA | cut -c1-7)
          SHORT_MAIN_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "dev_sha=$SHORT_DEV_SHA" >> $GITHUB_OUTPUT
          echo "main_sha=$SHORT_MAIN_SHA" >> $GITHUB_OUTPUT

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote backend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ steps.find-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:prod-${{ steps.find-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
          
          docker pull $DEV_TAG
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          docker push $PROD_TAG
          docker push $LATEST_TAG

  # Stage 2: Scan Backend
  scan-backend:
    name: Scan Backend
    runs-on: ubuntu-latest
    needs: [promote-backend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:prod-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  # Stage 3: Promote Frontend
  promote-frontend:
    name: Promote Frontend
    runs-on: ubuntu-latest
    needs: [promote-backend]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find dev SHA
        id: find-sha
        run: |
          DEV_SHA=$(git log --merges -1 --pretty=format:%P | awk '{print $2}')
          [ -z "$DEV_SHA" ] && DEV_SHA=${{ github.sha }}
          SHORT_DEV_SHA=$(echo $DEV_SHA | cut -c1-7)
          SHORT_MAIN_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "dev_sha=$SHORT_DEV_SHA" >> $GITHUB_OUTPUT
          echo "main_sha=$SHORT_MAIN_SHA" >> $GITHUB_OUTPUT

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote frontend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ steps.find-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:prod-${{ steps.find-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
          
          docker pull $DEV_TAG
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          docker push $PROD_TAG
          docker push $LATEST_TAG

  # Stage 4: Scan Frontend
  scan-frontend:
    name: Scan Frontend
    runs-on: ubuntu-latest
    needs: [promote-frontend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:prod-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'

  # Stage 5: Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: openluffy-runner
    needs: [scan-backend, scan-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update prod manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|tag:.*# backend|tag: prod-${SHORT_SHA} # backend|g" helm/openluffy/values/prod.yaml
          sed -i "s|tag:.*# frontend|tag: prod-${SHORT_SHA} # frontend|g" helm/openluffy/values/prod.yaml

      - name: Commit manifests
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/prod.yaml
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(prod): deploy prod-${SHORT_SHA} [skip ci]" || echo "No changes"
          git pull --rebase origin main || true
          git push

      - name: Inject secrets to ArgoCD
        run: |
          kubectl patch application openluffy-prod -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
