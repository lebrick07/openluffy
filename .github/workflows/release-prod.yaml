name: Release - Production

# Runs ONLY on merge to main - production deployment
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Promote tested dev images to production
  promote-images:
    name: Promote Dev Images to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      dev_sha: ${{ steps.find-dev-sha.outputs.dev_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to find merge base

      - name: Find dev SHA that was merged
        id: find-dev-sha
        run: |
          # Get the second parent of merge commit (the develop branch HEAD)
          DEV_SHA=$(git log --merges -1 --pretty=format:%P | awk '{print $2}')
          if [ -z "$DEV_SHA" ]; then
            # If not a merge commit, use current commit
            DEV_SHA=${{ github.sha }}
          fi
          SHORT_DEV_SHA=$(echo $DEV_SHA | cut -c1-7)
          SHORT_MAIN_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "dev_sha=$SHORT_DEV_SHA" >> $GITHUB_OUTPUT
          echo "main_sha=$SHORT_MAIN_SHA" >> $GITHUB_OUTPUT
          echo "📦 Promoting dev-${SHORT_DEV_SHA} → prod-${SHORT_MAIN_SHA}"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote backend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ steps.find-dev-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:prod-${{ steps.find-dev-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
          
          echo "Pulling tested image: $DEV_TAG"
          docker pull $DEV_TAG
          
          echo "Tagging as: $PROD_TAG"
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          
          echo "Pushing production tags"
          docker push $PROD_TAG
          docker push $LATEST_TAG
          
          echo "✅ Backend promoted: dev-${{ steps.find-dev-sha.outputs.dev_sha }} → prod-${{ steps.find-dev-sha.outputs.main_sha }}"

      - name: Promote frontend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ steps.find-dev-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:prod-${{ steps.find-dev-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
          
          echo "Pulling tested image: $DEV_TAG"
          docker pull $DEV_TAG
          
          echo "Tagging as: $PROD_TAG"
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          
          echo "Pushing production tags"
          docker push $PROD_TAG
          docker push $LATEST_TAG
          
          echo "✅ Frontend promoted: dev-${{ steps.find-dev-sha.outputs.dev_sha }} → prod-${{ steps.find-dev-sha.outputs.main_sha }}"

      - name: Update production manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Updating production environment with tag: prod-${SHORT_SHA}"
          
          # Update prod values
          sed -i "s|tag:.*# backend|tag: prod-${SHORT_SHA} # backend|g" helm/openluffy/values/prod.yaml
          sed -i "s|tag:.*# frontend|tag: prod-${SHORT_SHA} # frontend|g" helm/openluffy/values/prod.yaml
          
      - name: Commit production manifest changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/prod.yaml
          
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(prod): promote to prod-${SHORT_SHA} [skip ci]" || echo "No changes"
          
          # Pull with rebase to handle concurrent pushes
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            
            git fetch origin main
            
            if git rebase origin/main; then
              echo "Rebase successful"
              break
            else
              echo "Rebase failed, trying to resolve..."
              git rebase --abort || true
              git reset --hard HEAD~1
              git pull origin main
              
              sed -i "s|tag:.*# backend|tag: prod-${SHORT_SHA} # backend|g" helm/openluffy/values/prod.yaml
              sed -i "s|tag:.*# frontend|tag: prod-${SHORT_SHA} # frontend|g" helm/openluffy/values/prod.yaml
              
              git add helm/openluffy/values/prod.yaml
              git commit -m "chore(prod): promote to prod-${SHORT_SHA} [skip ci]" || echo "No changes"
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 2
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Failed to rebase after $MAX_RETRIES attempts"
            exit 1
          fi
          
          git push

  # Inject secrets into production ArgoCD Application
  inject-secrets:
    name: Inject Secrets to Production
    runs-on: openluffy-runner
    needs: [promote-images]
    
    steps:
      - name: Install kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
          fi
          kubectl version --client
          
      - name: Update production ArgoCD Application with secrets
        run: |
          # Update openluffy-prod Application
          kubectl patch application openluffy-prod -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
          echo "✅ Production application patched with secrets"
          
          # Note: ArgoCD sync policy determines if this deploys immediately or requires manual sync
          # Check argocd/openluffy-prod.yaml for syncPolicy configuration

  # Summary
  release-complete:
    name: Production Release Complete
    runs-on: ubuntu-latest
    needs: [promote-images, inject-secrets]
    steps:
      - name: Summary
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "🏴‍☠️ OpenLuffy Production Release Complete"
          echo ""
          echo "✅ Images promoted from dev-${{ needs.promote-images.outputs.dev_sha }} → prod-${SHORT_SHA}"
          echo "✅ Secrets injected to production"
          echo "✅ Production manifest updated"
          echo ""
          echo "Production: http://prod.openluffy.local"
          echo ""
          echo "⚠️ Check ArgoCD sync status:"
          echo "   http://argocd.local"
          echo ""
          echo "If manual sync is required:"
          echo "   kubectl patch application openluffy-prod -n argocd -p '{\"operation\":{\"sync\":{}}}' --type merge"
