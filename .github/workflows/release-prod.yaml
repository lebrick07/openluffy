name: Release - Production

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Promote Backend
  promote-backend:
    name: Promote Backend
    runs-on: openluffy-runner
    # Only run on PR merges from develop branch OR manual workflow_dispatch
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop') ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      packages: write
    outputs:
      dev_sha: ${{ steps.find-sha.outputs.dev_sha }}
      main_sha: ${{ steps.find-sha.outputs.main_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find dev SHA from deployed images
        id: find-sha
        run: |
          # Extract the actual dev tag from values file (what's deployed in dev/preprod)
          DEV_TAG=$(grep -A 3 "backend:" helm/openluffy/values/dev.yaml | grep "tag:" | awk '{print $2}' | cut -d'#' -f1 | tr -d ' ')
          DEV_SHA=$(echo $DEV_TAG | sed 's/dev-//')
          MAIN_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "dev_sha=$DEV_SHA" >> $GITHUB_OUTPUT
          echo "main_sha=$MAIN_SHA" >> $GITHUB_OUTPUT
          echo "✅ Will promote: dev-$DEV_SHA → prod-$MAIN_SHA"

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: lebrick07
          password: ${{ secrets.GH_PAT }}

      - name: Promote backend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ steps.find-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:prod-${{ steps.find-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
          
          echo "Pulling: $DEV_TAG"
          docker pull $DEV_TAG
          echo "Tagging as: $PROD_TAG"
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          echo "Pushing: $PROD_TAG"
          docker push $PROD_TAG
          docker push $LATEST_TAG
          echo "✅ Backend promoted successfully"

  # Stage 2: Scan Backend
  scan-backend:
    name: Scan Backend
    runs-on: openluffy-runner
    needs: [promote-backend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:prod-${{ needs.promote-backend.outputs.main_sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  # Stage 3: Promote Frontend
  promote-frontend:
    name: Promote Frontend
    runs-on: openluffy-runner
    needs: [promote-backend]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Find dev SHA from deployed images
        id: find-sha
        run: |
          # Extract the actual dev tag from values file (what's deployed in dev/preprod)
          DEV_TAG=$(grep -A 3 "frontend:" helm/openluffy/values/dev.yaml | grep "tag:" | awk '{print $2}' | cut -d'#' -f1 | tr -d ' ')
          DEV_SHA=$(echo $DEV_TAG | sed 's/dev-//')
          MAIN_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "dev_sha=$DEV_SHA" >> $GITHUB_OUTPUT
          echo "main_sha=$MAIN_SHA" >> $GITHUB_OUTPUT
          echo "✅ Will promote: dev-$DEV_SHA → prod-$MAIN_SHA"

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: lebrick07
          password: ${{ secrets.GH_PAT }}

      - name: Promote frontend image
        run: |
          DEV_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ steps.find-sha.outputs.dev_sha }}"
          PROD_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:prod-${{ steps.find-sha.outputs.main_sha }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
          
          echo "Pulling: $DEV_TAG"
          docker pull $DEV_TAG
          echo "Tagging as: $PROD_TAG"
          docker tag $DEV_TAG $PROD_TAG
          docker tag $DEV_TAG $LATEST_TAG
          echo "Pushing: $PROD_TAG"
          docker push $PROD_TAG
          docker push $LATEST_TAG
          echo "✅ Frontend promoted successfully"

  # Stage 4: Scan Frontend
  scan-frontend:
    name: Scan Frontend
    runs-on: openluffy-runner
    needs: [promote-frontend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:prod-${{ needs.promote-backend.outputs.main_sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'

  # Stage 5: Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: openluffy-runner
    needs: [scan-backend, scan-frontend, promote-backend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update prod manifests
        run: |
          PROD_SHA=${{ needs.promote-backend.outputs.main_sha }}
          sed -i "s|tag:.*# backend|tag: prod-${PROD_SHA} # backend|g" helm/openluffy/values/prod.yaml
          sed -i "s|tag:.*# frontend|tag: prod-${PROD_SHA} # frontend|g" helm/openluffy/values/prod.yaml
          echo "✅ Updated prod values to prod-${PROD_SHA}"

      - name: Commit manifests
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/prod.yaml
          PROD_SHA=${{ needs.promote-backend.outputs.main_sha }}
          git commit -m "chore(prod): deploy prod-${PROD_SHA} [skip ci]" || echo "No changes"
          git pull --rebase origin main || true
          git push

  # Inject secrets into ArgoCD Application
  inject-secrets:
    name: Inject Secrets to ArgoCD
    runs-on: openluffy-runner
    needs: [deploy-prod]
    
    steps:
      - name: Update ArgoCD Application with secret parameters
        run: |
          kubectl patch application openluffy-prod -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
          echo "✅ Secrets injected into ArgoCD"
