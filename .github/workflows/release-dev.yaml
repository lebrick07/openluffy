name: Release - Dev

on:
  pull_request:
    types: [closed]
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_PLATFORMS: linux/arm64

jobs:
  # Stage 1: Build Backend
  build-backend:
    name: Build Backend
    runs-on: openluffy-runner
    if: github.event.pull_request.merged == true
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 2: Scan Backend
  scan-backend:
    name: Scan Backend
    runs-on: openluffy-runner
    needs: [build-backend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'

  # Stage 3: Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: openluffy-runner
    if: github.event.pull_request.merged == true
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./openluffy-ui/Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 4: Scan Frontend
  scan-frontend:
    name: Scan Frontend
    runs-on: openluffy-runner
    needs: [build-frontend]
    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'

  # Stage 5: Deploy to Dev
  deploy-dev:
    name: Deploy to Dev
    runs-on: openluffy-runner
    needs: [scan-backend, scan-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update dev manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/dev.yaml
          sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/dev.yaml

      - name: Commit manifests
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/dev.yaml
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(dev): deploy dev-${SHORT_SHA} [skip ci]" || echo "No changes"
          git pull --rebase origin develop || true
          git push

      - name: Inject secrets to ArgoCD
        run: |
          kubectl patch application openluffy-dev -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '

  # Stage 6: Deploy to Preprod
  deploy-preprod:
    name: Deploy to Preprod
    runs-on: openluffy-runner
    needs: [deploy-dev]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Wait for dev stabilization
        run: sleep 30

      - name: Update preprod manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/preprod.yaml
          sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/preprod.yaml

      - name: Commit manifests
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/preprod.yaml
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(preprod): deploy dev-${SHORT_SHA} [skip ci]" || echo "No changes"
          git pull --rebase origin develop || true
          git push

      - name: Inject secrets to ArgoCD
        run: |
          kubectl patch application openluffy-preprod -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
