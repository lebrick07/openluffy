name: Release - Dev

# Runs on push to develop branch
on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_PLATFORMS: linux/arm64  # Change to 'linux/amd64,linux/arm64' for multi-arch

jobs:
  # Build, scan, push, and inject secrets - ALL IN ONE JOB
  build-scan-deploy:
    name: Build, Scan & Deploy to Dev/Preprod
    runs-on: openluffy-runner
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev-latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=sha,prefix=dev-
            type=raw,value=dev-latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./openluffy-ui/Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:dev-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:dev-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'

      - name: Update dev manifests
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Updating dev environment with tag: dev-${SHORT_SHA}"
          
          sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/dev.yaml
          sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/dev.yaml
          
      - name: Commit dev manifest changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/dev.yaml
          
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(dev): update image tags to dev-${SHORT_SHA} [skip ci]" || echo "No changes"
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            git fetch origin develop
            
            if git rebase origin/develop; then
              echo "Rebase successful"
              break
            else
              git rebase --abort || true
              git reset --hard HEAD~1
              git pull origin develop
              
              sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/dev.yaml
              sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/dev.yaml
              
              git add helm/openluffy/values/dev.yaml
              git commit -m "chore(dev): update image tags to dev-${SHORT_SHA} [skip ci]" || echo "No changes"
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 2
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Failed to rebase after $MAX_RETRIES attempts"
            exit 1
          fi
          
          git push

      - name: Inject secrets to dev environment
        run: |
          kubectl patch application openluffy-dev -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
          echo "✅ Dev secrets injected"

      - name: Inject secrets to preprod environment
        run: |
          kubectl patch application openluffy-preprod -n argocd --type merge --patch '
          spec:
            source:
              helm:
                parameters:
                  - name: secrets.claudeApiKey
                    value: "${{ secrets.ANTHROPIC_API_KEY }}"
                  - name: secrets.githubToken
                    value: "${{ secrets.GH_PAT }}"
          '
          echo "✅ Preprod secrets injected"

      - name: Trigger ArgoCD sync
        run: |
          kubectl patch application openluffy-dev -n argocd -p '{"operation":{"sync":{}}}' --type merge || true
          kubectl patch application openluffy-preprod -n argocd -p '{"operation":{"sync":{}}}' --type merge || true
          echo "✅ ArgoCD sync triggered"

      - name: Wait for dev deployment
        run: sleep 30

      - name: Promote to preprod
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Promoting dev-${SHORT_SHA} to preprod"
          
          sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/preprod.yaml
          sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/preprod.yaml

      - name: Commit preprod manifest changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/openluffy/values/preprod.yaml
          
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore(preprod): auto-promote dev-${SHORT_SHA} [skip ci]" || echo "No changes"
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            git fetch origin develop
            
            if git rebase origin/develop; then
              echo "Rebase successful"
              break
            else
              git rebase --abort || true
              git reset --hard HEAD~1
              git pull origin develop
              
              sed -i "s|tag:.*# backend|tag: dev-${SHORT_SHA} # backend|g" helm/openluffy/values/preprod.yaml
              sed -i "s|tag:.*# frontend|tag: dev-${SHORT_SHA} # frontend|g" helm/openluffy/values/preprod.yaml
              
              git add helm/openluffy/values/preprod.yaml
              git commit -m "chore(preprod): auto-promote dev-${SHORT_SHA} [skip ci]" || echo "No changes"
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              sleep 2
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Failed to rebase after $MAX_RETRIES attempts"
            exit 1
          fi
          
          git push

      - name: Summary
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "🏴‍☠️ OpenLuffy Dev Release Complete"
          echo ""
          echo "✅ Images built: dev-${SHORT_SHA}"
          echo "✅ Security scans passed"
          echo "✅ Secrets injected to dev/preprod"
          echo "✅ Dev environment updated"
          echo "✅ Auto-promoted to preprod"
          echo ""
          echo "Dev: http://dev.openluffy.local"
          echo "Preprod: http://preprod.openluffy.local"
