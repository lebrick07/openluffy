apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    component: secrets
type: Opaque
stringData:
  # Claude API key for Luffy agent (optional, set to enable AI features)
  claude-api-key: {{ .Values.secrets.claudeApiKey | default "" | quote }}
  # GitHub token for repository operations (optional)
  github-token: {{ .Values.secrets.githubToken | default "" | quote }}
  # GitHub webhook secret (optional)
  github-webhook-secret: {{ .Values.secrets.githubWebhookSecret | default "" | quote }}
  # OpenAI API key (optional, alternative to Claude)
  openai-api-key: {{ .Values.secrets.openaiApiKey | default "" | quote }}
