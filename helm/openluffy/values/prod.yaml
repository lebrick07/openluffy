# Production Environment
namespace: openluffy-prod
environment: prod

backend:
  image:
    repository: ghcr.io/lebrick07/openluffy-backend
    tag: dev-7e897b1 # Latest tested in dev+preprod (v1.1.0 + workflow fixes)
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8000

frontend:
  image:
    repository: ghcr.io/lebrick07/openluffy-frontend
    tag: dev-7e897b1 # Latest tested in dev+preprod (v1.1.0 + workflow fixes)
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 80

ingress:
  enabled: true
  className: traefik
  host: openluffy.local
  path: /
  pathType: Prefix

github:
  enabled: true

aws:
  roleArn: ""
